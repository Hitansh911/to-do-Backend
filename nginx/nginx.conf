events {
    worker_connections 1024;
}

http {
    upstream auth-service {
        server auth-service:5003;
    }

    upstream notes-service {
        server notes-service:5001;
    }

    upstream todo-service {
        server todo-service:5002;
    }

    upstream frontend-service {
        server frontend-service:3000;
    }

    server {
        listen 80;

        # 1. SERVE THE NEXT.JS FRONTEND
        location / {
            proxy_pass http://frontend-service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # 2. PROXY API CALLS TO PYTHON MICROSERVICES
        location /api/auth/ {
            proxy_pass http://auth-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/notes/ {
            proxy_pass http://notes-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/todos/ {
            proxy_pass http://todo-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}